version: '3.8'

services:
  edu-agent:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./vector_db:/app/vector_db
      - ./data:/app/data
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
